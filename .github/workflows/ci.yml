name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/grspecials_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/grspecials_test

      - name: Type check
        run: npm run type-check


  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: grspecials_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/grspecials_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/grspecials_test
      NEXTAUTH_SECRET: test-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:3000
      SKIP_ENV_VALIDATION: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Push DB schema
        run: npm run db:push
        working-directory: packages/db

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-type-check]
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/grspecials_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/grspecials_test
      NEXTAUTH_SECRET: test-secret-do-not-use-in-prod
      NEXTAUTH_URL: http://localhost:3000
      SKIP_ENV_VALIDATION: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Check bundle size (Lighthouse budget)
        run: |
          echo "Bundle analysis would run here in production"
          echo "Target: Lighthouse mobile score ≥ 90"
